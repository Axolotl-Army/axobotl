name: axobotl

services:
  postgres:
    image: postgres:16-alpine
    container_name: db
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-axobotl}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - 5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  bot:
    image: ghcr.io/${GHCR_OWNER:-axolotl-army}/axobotl-bot:${IMAGE_TAG:-latest}
    build:
      context: .
      target: bot
    env_file: .env
    container_name: bot
    environment:
      - DATABASE_URL=postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-axobotl}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  dashboard:
    image: ghcr.io/${GHCR_OWNER:-axolotl-army}/axobotl-dashboard:${IMAGE_TAG:-latest}
    build:
      context: .
      target: dashboard
    env_file: .env
    container_name: dashboard
    environment:
      - DATABASE_URL=postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-axobotl}
      - PORT=3000
    ports:
      - "${DASHBOARD_PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data: